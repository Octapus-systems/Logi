<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Projectri - Sign In</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            padding: 0;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .purple-glow {
            background: radial-gradient(circle at center, rgba(140, 98, 255, 0.12) 0%, rgba(20, 18, 27, 0) 70%);
        }
        .btn-gradient {
            background: linear-gradient(135deg, #8c62ff 0%, #b49aff 100%);
            box-shadow: 0 4px 20px rgba(140, 98, 255, 0.3);
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary-fixed": "#e8ddff",
                        "outline-variant": "#494455",
                        "tertiary": "#ffb86e",
                        "on-error": "#690005",
                        "surface-variant": "#36333d",
                        "surface-container": "#211e28",
                        "on-primary-fixed-variant": "#5116c2",
                        "surface": "#14121b",
                        "inverse-on-surface": "#322f39",
                        "primary-container": "#9c7aff",
                        "error-container": "#93000a",
                        "primary": "#cebdff",
                        "on-error-container": "#ffdad6",
                        "surface-container-lowest": "#0f0d16",
                        "on-tertiary-container": "#402300",
                        "error": "#ffb4ab",
                        "background": "#14121b",
                        "primary-fixed-dim": "#cebdff",
                        "on-secondary-container": "#bea8ff",
                        "on-secondary": "#371a7b",
                        "on-secondary-fixed": "#21005d",
                        "tertiary-fixed-dim": "#ffb86e",
                        "secondary-fixed-dim": "#cfbdff",
                        "on-primary-container": "#310083",
                        "outline": "#948ea0",
                        "inverse-surface": "#e7e0ed",
                        "on-tertiary": "#492900",
                        "secondary-fixed": "#e8ddff",
                        "surface-container-highest": "#36333d",
                        "secondary-container": "#4e3493",
                        "on-surface": "#e7e0ed",
                        "surface-tint": "#cebdff",
                        "surface-container-high": "#2b2832",
                        "surface-dim": "#14121b",
                        "surface-bright": "#3b3842",
                        "inverse-primary": "#693bdb",
                        "on-primary-fixed": "#21005e",
                        "on-tertiary-fixed": "#2c1600",
                        "on-surface-variant": "#cbc3d7",
                        "on-primary": "#380094",
                        "tertiary-container": "#cd7e19",
                        "on-background": "#e7e0ed",
                        "secondary": "#cfbdff",
                        "on-secondary-fixed-variant": "#4e3493",
                        "surface-container-low": "#1d1a23",
                        "on-tertiary-fixed-variant": "#693c00",
                        "tertiary-fixed": "#ffdcbd"
                    },
                    "fontFamily": {
                        "h3": ["Plus Jakarta Sans"],
                        "h1": ["Plus Jakarta Sans"],
                        "label-sm": ["Plus Jakarta Sans"],
                        "caps-xs": ["Plus Jakarta Sans"],
                        "body-md": ["Plus Jakarta Sans"],
                        "body-lg": ["Plus Jakarta Sans"],
                        "h2": ["Plus Jakarta Sans"]
                    },
                    "fontSize": {
                        "h3": ["24px", {"lineHeight": "1.4", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                        "h1": ["40px", {"lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "label-sm": ["14px", {"lineHeight": "1.4", "letterSpacing": "0.01em", "fontWeight": "500"}],
                        "caps-xs": ["12px", {"lineHeight": "1.2", "letterSpacing": "0.05em", "fontWeight": "700"}],
                        "body-md": ["16px", {"lineHeight": "1.6", "fontWeight": "400"}],
                        "body-lg": ["18px", {"lineHeight": "1.6", "fontWeight": "400"}],
                        "h2": ["32px", {"lineHeight": "1.3", "letterSpacing": "-0.02em", "fontWeight": "600"}]
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "container-padding": "32px",
                        "sm": "8px",
                        "xs": "4px",
                        "xl": "40px",
                        "md": "16px",
                        "lg": "24px",
                        "grid-gutter": "24px",
                        "unit": "4px",
                        "xxl": "64px"
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-surface text-on-surface min-h-screen flex items-center justify-center relative overflow-hidden">
<!-- Ambient Background Glow -->
<div class="purple-glow absolute inset-0 z-0"></div>
<!-- Login Card -->
<main class="relative z-10 w-full max-w-[440px] px-lg">
<section class="glass-card rounded-[32px] p-xl flex flex-col gap-lg shadow-2xl">
<!-- Header with Logo and Title -->
<header class="flex flex-col items-center gap-md">
<div class="flex items-center gap-md">
<div class="w-10 h-10 rounded-lg bg-primary-container flex items-center justify-center shadow-lg shadow-primary/10">
<span class="material-symbols-outlined text-on-primary-container text-[24px]" style="font-variation-settings: 'FILL' 1;">task_alt</span>
</div>
<h1 class="text-h3 font-h3 text-white">Projectri</h1>
</div>
</header>
<form class="flex flex-col gap-lg" onsubmit="return false;">
<!-- Email Field -->
<div class="space-y-sm">
<label class="font-label-sm text-label-sm text-on-surface-variant">Email</label>
<div class="relative">
<input class="w-full bg-white/5 border border-white/10 rounded-xl px-md py-md text-white placeholder:text-outline-variant focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all duration-300 backdrop-blur-md" placeholder="you@company.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-sm">
<div class="flex justify-between items-center">
<label class="font-label-sm text-label-sm text-on-surface-variant">Password</label>
<a class="text-label-sm text-outline-variant hover:text-primary transition-colors" href="#">Forgot password?</a>
</div>
<div class="relative group">
<input class="w-full bg-white/5 border border-white/10 rounded-xl px-md py-md text-white placeholder:text-outline-variant focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all duration-300 backdrop-blur-md pr-xl" placeholder="Password" type="password"/>
<button class="absolute right-md top-1/2 -translate-y-1/2 text-outline-variant hover:text-white transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
</div>
<!-- Action Button -->
<button class="btn-gradient w-full py-4 rounded-full font-label-sm text-label-sm text-on-primary-container font-bold flex items-center justify-center gap-sm active:scale-[0.98] transition-transform duration-200" type="submit">
<span class="material-symbols-outlined text-[20px]">login</span>
                    Sign in
                </button>
<!-- Footer Link -->
<div class="text-center pt-md">
<a class="text-label-sm text-outline-variant hover:text-white transition-colors" href="#">
                        Need an account? <span class="text-primary/80">Sign up</span>
</a>
</div>
</form>
</section>
</main>
<!-- Footer Copyright -->
<footer class="absolute bottom-md left-0 right-0 text-center">
<p class="font-caps-xs text-caps-xs text-outline-variant/50 uppercase tracking-[0.2em]">Focused Productivity © 2024</p>
</footer>
</body></html>
